# Configuration for ugreen-truenas-zfs.service.
#
# This file is installed to /etc/ugreen-truenas-zfs.conf and loaded by systemd
# as an EnvironmentFile. The bay paths below match the tested UGREEN DXP 4800
# PRO layout; verify them before using a different model.

# Set this to the Proxmox VM ID of your TrueNAS Scale VM.
# VMID=100
DEBUG=1
POLL_INTERVAL=30
LEDS_OFF_ON_EXIT=1

LED_BASE=/sys/class/leds
ALERT_THRESHOLD=0.75

BAY_1_PATH=/dev/disk/by-path/pci-0000:00:10.0-ata-1
BAY_2_PATH=/dev/disk/by-path/pci-0000:00:10.0-ata-2
BAY_3_PATH=/dev/disk/by-path/pci-0000:00:10.0-ata-3
BAY_4_PATH=/dev/disk/by-path/pci-0000:00:10.0-ata-4
