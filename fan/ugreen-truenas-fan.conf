# Configuration for ugreen-truenas-fan.service.
#
# This file is installed to /etc/ugreen-truenas-fan.conf and loaded by systemd
# as an EnvironmentFile. Values may be adjusted for other UGREEN DXP models or
# if hwmon numbering changes after boot.

# Set this to the Proxmox VM ID of your TrueNAS Scale VM.
# VMID=100
DEBUG=1
POLL_INTERVAL=30

FAN_PWM_PATH=/sys/class/hwmon/hwmon3/pwm3
FAN_PWM_ENABLE_PATH=/sys/class/hwmon/hwmon3/pwm3_enable
FAN_INPUT_PATH=/sys/class/hwmon/hwmon3/fan3_input
CPU_TEMP_PATH=/sys/class/hwmon/hwmon3/temp1_input

HDD_FAN_CURVE=30:90,35:120,40:175,43:220,45:255
CPU_FAN_CURVE=45:90,55:115,65:150,75:190,85:225,95:255
MIN_PWM=90
MAX_PWM=255
FAILSAFE_PWM=255
MANUAL_PWM_ENABLE_VALUE=1
AUTO_PWM_ENABLE_VALUE=2
RESET_PWM_ON_EXIT=1

TEMP_CHIP_REGEX="(?i)(drivetemp|nvme|ata|scsi|sas|sat|disk|hdd|ssd)"
